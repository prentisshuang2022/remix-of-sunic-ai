openapi: "3.0.3"
info:
  title: Sunic AI Employee - HR 智能管理平台 API
  version: "1.0.0"
  description: |
    三工光电人事 AI 员工系统后端 API 契约。
    
    ## 通用约定
    - 所有接口返回统一包装结构 `ApiResponse<T>`
    - 分页接口统一使用 `PaginatedResponse<T>`
    - 认证方式：Bearer Token (JWT)
    - 时间格式：ISO 8601 (`2026-04-22T09:00:00+08:00`)
    - 敏感字段展示脱敏，存储加密
    
    ## 角色体系
    | 角色 | 代码 | 说明 |
    |------|------|------|
    | 候选人 | candidate | 只能查看自己的投递信息 |
    | 普通员工 | employee | 自己的数据 + AI 助手 |
    | 部门主管 | manager | 自己 + 直属下属 |
    | HR | hr | 全公司员工 + 招聘 + 配置 |
    | 面试官 | interviewer | 自己参与的面试 |
    | 管理员 | admin | 全部权限 |
    
    ## 错误码前缀
    | 模块 | 前缀 | 范围 |
    |------|------|------|
    | 认证 | AUTH_ | 001-099 |
    | 员工 | EMP_ | 001-099 |
    | 部门 | DEPT_ | 001-099 |
    | 考勤 | ATT_ | 001-099 |
    | 绩效 | PERF_ | 001-099 |
    | 招聘 | RECRUIT_ | 001-099 |
    | 面试 | INTERVIEW_ | 001-099 |
    | 培训 | TRAIN_ | 001-099 |
    | AI | AI_ | 001-099 |

servers:
  - url: https://api.sunic-hr.com/v1
    description: Production
  - url: https://api-staging.sunic-hr.com/v1
    description: Staging

tags:
  - name: Auth
    description: 认证与授权
  - name: Employees
    description: 员工档案管理
  - name: Departments
    description: 部门与组织架构
  - name: Attendance
    description: 考勤管理（异常、加班）
  - name: Performance
    description: 绩效管理（OKR/KPI/面谈）
  - name: Recruitment
    description: 招聘管理（岗位、简历、画像）
  - name: Interview
    description: 面试管理
  - name: Training
    description: 培训管理（考试、题库、导师、材料）
  - name: AI
    description: AI 对话与智能能力

paths:
  # ==================== Auth ====================
  /auth/login:
    post:
      tags: [Auth]
      summary: 用户登录
      operationId: authLogin
      description: |
        使用工号/手机号 + 密码登录，返回 JWT token 对。
        错误码：AUTH_001 用户不存在，AUTH_002 密码错误，AUTH_003 账号已禁用。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [account, password]
              properties:
                account:
                  type: string
                  description: 工号或手机号
                  example: "E001"
                password:
                  type: string
                  format: password
                  example: "********"
            example:
              account: "E001"
              password: "Abc123456"
      responses:
        "200":
          description: 登录成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse_LoginData"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "422":
          $ref: "#/components/responses/ValidationError"

  /auth/logout:
    post:
      tags: [Auth]
      summary: 退出登录
      operationId: authLogout
      security:
        - bearerAuth: []
      description: 注销当前 token，加入黑名单。
      responses:
        "200":
          description: 退出成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse_Null"

  /auth/refresh:
    post:
      tags: [Auth]
      summary: 刷新 Token
      operationId: authRefresh
      description: |
        使用 refresh_token 换取新的 access_token。
        错误码：AUTH_004 refresh_token 已过期。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refresh_token]
              properties:
                refresh_token:
                  type: string
      responses:
        "200":
          description: 刷新成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse_LoginData"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /auth/me:
    get:
      tags: [Auth]
      summary: 当前用户信息与权限
      operationId: authMe
      security:
        - bearerAuth: []
      description: 返回当前登录用户信息、角色列表、权限列表。
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse_CurrentUser"

  # ==================== Employees ====================
  /employees:
    get:
      tags: [Employees]
      summary: 员工列表（分页）
      operationId: listEmployees
      security:
        - bearerAuth: []
      description: |
        分页查询员工，支持多条件筛选。
        - employee 角色：只返回自己
        - manager：自己 + 直属下属
        - hr/admin：全部
        错误码：EMP_001 无权限访问。
      parameters:
        - $ref: "#/components/parameters/page"
        - $ref: "#/components/parameters/pageSize"
        - name: keyword
          in: query
          schema:
            type: string
          description: 搜索关键词（姓名/工号/手机号）
        - name: department
          in: query
          schema:
            type: string
          description: 部门筛选
        - name: entity
          in: query
          schema:
            type: string
          description: 合同归属实体
        - name: status
          in: query
          schema:
            $ref: "#/components/schemas/EmployeeStatus"
          description: 员工状态
        - name: contract_status
          in: query
          schema:
            type: string
            enum: [normal, expiring_soon, expired]
          description: 合同状态
        - name: sync_status
          in: query
          schema:
            type: string
            enum: [synced, pending, diff, failed]
          description: 钉钉同步状态
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedResponse_EmployeeListItem"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /employees/{id}:
    get:
      tags: [Employees]
      summary: 员工详情
      operationId: getEmployee
      security:
        - bearerAuth: []
      description: |
        获取员工完整档案，包括基础信息、合同、教育、附件列表、数据源元信息。
        敏感字段（身份证、手机号）按角色脱敏：employee 看脱敏，hr/admin 看完整。
      parameters:
        - $ref: "#/components/parameters/id"
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse_EmployeeDetail"
        "404":
          $ref: "#/components/responses/NotFound"

  /employees/sync:
    post:
      tags: [Employees]
      summary: 钉钉全量同步
      operationId: syncEmployees
      security:
        - bearerAuth: []
      description: |
        触发钉钉员工数据全量同步。仅 hr/admin 可用。
        异步任务，返回任务 ID，可轮询状态。
        错误码：EMP_010 钉钉 API 连接失败，EMP_011 同步正在进行中。
      responses:
        "200":
          description: 同步任务已启动
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse_SyncResult"

  /employees/{id}/resolve-diff:
    put:
      tags: [Employees]
      summary: 处理钉钉差异
      operationId: resolveDiff
      security:
        - bearerAuth: []
      description: |
        处理钉钉与本系统的字段差异。仅 hr/admin。
        错误码：EMP_020 无差异可处理。
      parameters:
        - $ref: "#/components/parameters/id"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [action, fields]
              properties:
                action:
                  type: string
                  enum: [accept_dingtalk, keep_system]
                  description: 处理动作
                fields:
                  type: array
                  items:
                    type: string
                  description: 要处理的字段列表
            example:
              action: "accept_dingtalk"
              fields: ["phone", "department"]
      responses:
        "200":
          description: 处理成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse_EmployeeDetail"

  /employees/batch:
    post:
      tags: [Employees]
      summary: 批量操作
      operationId: batchEmployees
      security:
        - bearerAuth: []
      description: 批量同步/接受变更/提醒补资料。仅 hr/admin。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [ids, action]
              properties:
                ids:
                  type: array
                  items:
                    type: string
                action:
                  type: string
                  enum: [sync, accept, remind]
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse_BatchResult"

  /employees/{id}/materials:
    post:
      tags: [Employees]
      summary: 上传员工材料
      operationId: uploadMaterial
      security:
        - bearerAuth: []
      description: |
        上传合同/身份证/学历/资质证书等材料。
        支持 OCR 自动识别（身份证、学历证书）。
        文件大小限制：20MB，格式：PDF/JPG/PNG。
        签名 URL 有效期 1 小时。
      parameters:
        - $ref: "#/components/parameters/id"
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file, type]
              properties:
                file:
                  type: string
                  format: binary
                type:
                  type: string
                  enum: [contract, id_card, diploma, cert]
      responses:
        "200":
          description: 上传成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse_MaterialUploadResult"

  /employees/{id}/changes:
    get:
      tags: [Employees]
      summary: 异动记录
      operationId: listChanges
      security:
        - bearerAuth: []
      description: 查询员工历史异动（入职/转正/调岗/续签/部门变更等）。
      parameters:
        - $ref: "#/components/parameters/id"
        - $ref: "#/components/parameters/page"
        - $ref: "#/components/parameters/pageSize"
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedResponse_ChangeRecord"

  /employees/export:
    post:
      tags: [Employees]
      summary: 导出员工数据
      operationId: exportEmployees
      security:
        - bearerAuth: []
      description: |
        按筛选条件导出员工列表为 Excel。异步生成，返回下载 URL。
        签名 URL 有效期 1 小时。仅 hr/admin。
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                keyword:
                  type: string
                department:
                  type: string
                entity:
                  type: string
                status:
                  $ref: "#/components/schemas/EmployeeStatus"
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse_ExportResult"

  # ==================== Departments ====================
  /departments/tree:
    get:
      tags: [Departments]
      summary: 部门树形结构
      operationId: getDepartmentTree
      security:
        - bearerAuth: []
      description: |
        返回完整部门树，最多 6 级。包含每个节点的员工数量。
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse_DepartmentTreeArray"

  /departments:
    post:
      tags: [Departments]
      summary: 创建部门
      operationId: createDepartment
      security:
        - bearerAuth: []
      description: 创建部门节点。仅 hr/admin。错误码：DEPT_001 父部门不存在，DEPT_002 层级超过 6 级。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDepartmentRequest"
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse_Department"
        "422":
          $ref: "#/components/responses/ValidationError"

  /departments/{id}:
    put:
      tags: [Departments]
      summary: 更新部门
      operationId: updateDepartment
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/id"
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateDepartmentRequest"
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse_Department"
    delete:
      tags: [Departments]
      summary: 删除部门
      operationId: deleteDepartment
      security:
        - bearerAuth: []
      description: 删除部门。错误码：DEPT_003 部门下有员工不可删除。
      parameters:
        - $ref: "#/components/parameters/id"
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse_Null"

  # ==================== Attendance ====================
  /attendance/exceptions:
    get:
      tags: [Attendance]
      summary: 考勤异常列表
      operationId: listAttendanceExceptions
      security:
        - bearerAuth: []
      description: |
        查询考勤异常记录。
        - employee：只看自己
        - manager：自己 + 下属
        - hr/admin：全部
      parameters:
        - $ref: "#/components/parameters/page"
        - $ref: "#/components/parameters/pageSize"
        - name: date_from
          in: query
          schema:
            type: string
            format: date
        - name: date_to
          in: query
          schema:
            type: string
            format: date
        - name: type
          in: query
          schema:
            type: string
            enum: [late, early_leave, absent, missing_clock, overtime]
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, waiting_employee, approving, done]
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedResponse_AttendanceException"

  /attendance/exceptions/{id}:
    get:
      tags: [Attendance]
      summary: 考勤异常详情
      operationId: getAttendanceException
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/id"
      description: 获取异常详情，含 AI 处理建议和打卡时间线。
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse_AttendanceExceptionDetail"
    put:
      tags: [Attendance]
      summary: 处理考勤异常
      operationId: resolveAttendanceException
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/id"
      description: |
        处理异常：补卡/核销/联系员工/升级主管。
        状态流：pending → waiting_employee → approving → done。
        错误码：ATT_001 异常已处理。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [action]
              properties:
                action:
                  type: string
                  enum: [make_up, write_off, contact, escalate]
                  description: "补卡 / 核销 / 联系员工 / 升级主管"
                note:
                  type: string
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse_AttendanceException"

  /attendance/exceptions/batch:
    post:
      tags: [Attendance]
      summary: 批量处理异常
      operationId: batchResolveExceptions
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [ids, action]
              properties:
                ids:
                  type: array
                  items:
                    type: string
                action:
                  type: string
                  enum: [make_up, write_off, contact, escalate]
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse_BatchResult"

  /attendance/overtime:
    get:
      tags: [Attendance]
      summary: 加班记录列表
      operationId: listOvertime
      security:
        - bearerAuth: []
      description: |
        查询加班记录。区分职能部门（餐补/调休）和生产一线（金额补贴）。
      parameters:
        - $ref: "#/components/parameters/page"
        - $ref: "#/components/parameters/pageSize"
        - name: date_from
          in: query
          schema:
            type: string
            format: date
        - name: date_to
          in: query
          schema:
            type: string
            format: date
        - name: dept_type
          in: query
          schema:
            type: string
            enum: [functional, production]
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, approved, rejected]
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedResponse_OvertimeRecord"

  /attendance/overtime/{id}:
    put:
      tags: [Attendance]
      summary: 核销加班
      operationId: resolveOvertime
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/id"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [action]
              properties:
                action:
                  type: string
                  enum: [approve, reject]
                note:
                  type: string
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse_OvertimeRecord"

  /attendance/overtime/batch:
    post:
      tags: [Attendance]
      summary: 批量核销加班
      operationId: batchResolveOvertime
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [ids, action]
              properties:
                ids:
                  type: array
                  items:
                    type: string
                action:
                  type: string
                  enum: [approve, reject]
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse_BatchResult"

  # ==================== Performance ====================
  /performance/overview:
    get:
      tags: [Performance]
      summary: 绩效概览统计
      operationId: getPerformanceOverview
      security:
        - bearerAuth: []
      description: 返回在考周期数、待处理、超期、AI 异常预警等汇总数据。
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse_PerformanceOverview"

  /performance/cycles:
    get:
      tags: [Performance]
      summary: 考核周期列表
      operationId: listPerformanceCycles
      security:
        - bearerAuth: []
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse_CycleArray"
    post:
      tags: [Performance]
      summary: 创建考核周期
      operationId: createPerformanceCycle
      security:
        - bearerAuth: []
      description: |
        创建新的考核周期，含 5 阶段配置。仅 hr/admin。
        错误码：PERF_001 时间范围与已有周期重叠。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCycleRequest"
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse_Cycle"

  /performance/cycles/{id}:
    get:
      tags: [Performance]
      summary: 周期详情
      operationId: getPerformanceCycle
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/id"
      description: 返回周期详情，含 5 阶段进度和员工考核列表。
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse_CycleDetail"

  /performance/cycles/{id}/remind:
    post:
      tags: [Performance]
      summary: 一键催办
      operationId: remindCycle
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/id"
      description: 向超期未提交员工推送催办通知（钉钉）。仅 hr/admin。
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse_RemindResult"

  /performance/forms/{id}:
    get:
      tags: [Performance]
      summary: 绩效表单详情
      operationId: getPerformanceForm
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/id"
      description: |
        获取绩效表单，含 KPI 评分列表 + AI 建议分数。
        employee 只能看自己的；manager 可看下属的。
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse_PerformanceForm"
    put:
      tags: [Performance]
      summary: 提交/更新绩效评分
      operationId: submitPerformanceForm
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/id"
      description: |
        提交或保存草稿。KPI 权重总和必须 = 100%。
        错误码：PERF_010 权重不等于100%，PERF_011 非当前阶段不可提交。
      requestBody:
