                  type: integer
                  description: 周次（1/2/4/6/8）
                content:
                  type: string
                attachments:
                  type: array
                  items:
                    type: string
                    format: uri
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse_Checkpoint"

  # ==================== AI ====================
  /ai/chat/send:
    post:
      tags: [AI]
      summary: 发送 AI 对话消息（流式）
      operationId: sendAiMessage
      security:
        - bearerAuth: []
      description: |
        发送消息到 AI 助手，返回 SSE 流式响应。
        
        **SSE 格式**：
        ```
        event: thinking
        data: {"content": "正在分析..."}
        
        event: message
        data: {"content": "根据您的查询..."}
        
        event: sources
        data: {"items": [{"title": "...", "url": "..."}]}
        
        event: card
        data: {"type": "candidate", "data": {...}}
        
        event: followups
        data: {"items": ["追问1", "追问2"]}
        
        event: done
        data: {"token_usage": {"prompt": 500, "completion": 300}}
        ```
        
        **隐私保护**：AI 助手基于当前登录用户身份过滤数据，不泄露他人隐私。
        **Prompt Injection 防护**：用户输入不能影响系统 prompt。
        **对话保留策略**：保留 90 天后归档。
        
        预估 token 消耗：500-3000 tokens。超时：120s。
        
        Content-Type: text/event-stream
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [message]
              properties:
                session_id:
                  type: string
                  nullable: true
                  description: 会话 ID，null 表示新建会话
                scene:
                  type: string
                  enum: [hr_assistant, resume_screener, interview_helper, performance_coach, knowledge_qa, data_insight]
                  description: 对话场景
                message:
                  type: string
                  description: 用户消息
            example:
              session_id: null
              scene: "hr_assistant"
              message: "我还剩几天年假？"
      responses:
        "200":
          description: SSE 流式响应
          content:
            text/event-stream:
              schema:
                type: string
                description: SSE 事件流，见 description 中的格式说明

  /ai/chat/sessions:
    get:
      tags: [AI]
      summary: 会话列表
      operationId: listAiSessions
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/page"
        - $ref: "#/components/parameters/pageSize"
        - name: scene
          in: query
          schema:
            type: string
        - name: keyword
          in: query
          schema:
            type: string
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedResponse_ChatSession"

  /ai/chat/sessions/{id}:
