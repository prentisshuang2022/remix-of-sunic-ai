      operationId: updateAiSession
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/id"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [action]
              properties:
                action:
                  type: string
                  enum: [pin, unpin, rename, delete]
                title:
                  type: string
                  description: action=rename 时必填
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse_ChatSession"

  /ai/resume/screen:
    post:
      tags: [AI]
      summary: AI 简历筛选
      operationId: aiResumeScreen
      security:
        - bearerAuth: []
      description: |
        AI 对指定简历进行筛选评估，输出评分 + 亮点 + 风险提示。
        结果仅供参考，最终决定必须由人类做出。
        预估 token 消耗：~2000 tokens/简历。超时：30s。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [resume_id, job_id]
              properties:
                resume_id:
                  type: string
                job_id:
                  type: string
      responses:
        "200":
          description: 成功
