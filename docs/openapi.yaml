components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    id:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    page:
      name: page
      in: query
      schema:
        type: integer
        minimum: 1
        default: 1
    pageSize:
      name: page_size
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20

  responses:
    Unauthorized:
      description: 未认证或 token 过期
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            success: false
            data: null
            error:
              code: "AUTH_001"
              message: "Token 已过期，请重新登录"
              details: null
    Forbidden:
      description: 权限不足
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            success: false
            data: null
            error:
              code: "AUTH_005"
              message: "权限不足，无法访问该资源"
              details: null
    NotFound:
      description: 资源不存在
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            success: false
            data: null
            error:
              code: "COMMON_404"
              message: "请求的资源不存在"
              details: null
    ValidationError:
      description: 请求参数校验失败
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            success: false
            data: null
            error:
              code: "COMMON_422"
              message: "请求参数校验失败"
              details:
                - field: "account"
                  message: "工号或手机号不能为空"

  schemas:
    # ===== Common =====
    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          example: false
        data:
          nullable: true
          example: null
        error:
          type: object
          properties:
            code:
              type: string
              example: "AUTH_001"
            message:
              type: string
              example: "用户不存在"
            details:
              nullable: true

    ApiResponse_Null:
      type: object
      properties:
        success:
          type: boolean
          example: true
        data:
          nullable: true
          example: null
        error:
          nullable: true
          example: null

    # ===== Auth =====
    LoginData:
      type: object
      properties:
        access_token:
          type: string
        refresh_token:
          type: string
        expires_in:
          type: integer
          description: 过期时间（秒）
          example: 7200
        user:
          $ref: "#/components/schemas/CurrentUser"

    ApiResponse_LoginData:
      type: object
      properties:
        success:
          type: boolean
          example: true
        data:
          $ref: "#/components/schemas/LoginData"
        error:
          nullable: true

    CurrentUser:
      type: object
      properties:
        id:
          type: string
          format: uuid
        employee_id:
          type: string
          example: "E001"
        name:
          type: string
          example: "张伟"
        avatar:
          type: string
          nullable: true
        roles:
          type: array
          items:
            type: string
            enum: [candidate, employee, manager, hr, interviewer, admin]
        permissions:
          type: array
          items:
            type: string

    ApiResponse_CurrentUser:
      type: object
      properties:
        success:
          type: boolean
        data:
          $ref: "#/components/schemas/CurrentUser"
        error:
          nullable: true

    # ===== Employee =====
    EmployeeStatus:
      type: string
      enum: [active, on_leave, probation, resigned, suspended]

    EmployeeListItem:
